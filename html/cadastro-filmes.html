<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🎥 CineWeb</a>
            <ul class="navbar-nav me-auto flex-row gap-3">
                <li class="nav-item"><a class="nav-link active" href="cadastro-filmes.html">Filmes</a></li>
                <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
                <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a></li>
                <li class="nav-item"><a class="nav-link" href="sessoes.html">Ver Sessões</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Cadastro de Novo Filme</h2>
        <hr>
        
        <form id="form-filme" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Título</label>
                <input type="text" id="titulo" class="form-control" required>
            </div>
            
            <div class="col-md-6">
                <label class="form-label">Gênero</label>
                <select id="genero" class="form-select" required>
                    <option value="">Selecione...</option>
                    <option value="Ação">Ação</option>
                    <option value="Comédia">Comédia</option>
                    <option value="Drama">Drama</option>
                    <option value="Ficção">Ficção Científica</option>
                    <option value="Terror">Terror</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label">Descrição</label>
                <textarea id="descricao" class="form-control" rows="3" required></textarea>
            </div>

            <div class="col-md-4">
                <label class="form-label">Classificação Indicativa</label>
                <select id="classificacao" class="form-select" required>
                    <option value="Livre">Livre</option>
                    <option value="10 anos">10 anos</option>
                    <option value="12 anos">12 anos</option>
                    <option value="14 anos">14 anos</option>
                    <option value="16 anos">16 anos</option>
                    <option value="18 anos">18 anos</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Duração (minutos)</label>
                <input type="number" id="duracao" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Data de Estreia</label>
                <input type="date" id="data-estreia" class="form-control" required>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary">Salvar Filme</button>
            </div>
        </form>
    </div>

    <script src="filmes.js"></script>
</body>
</html>
