<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Salas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🎥 CineWeb</a>
            <ul class="navbar-nav me-auto flex-row gap-3">
                <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
                <li class="nav-item"><a class="nav-link active" href="cadastro-salas.html">Salas</a></li>
                <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
                <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a></li>
                <li class="nav-item"><a class="nav-link" href="sessoes.html">Ver Sessões</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Cadastro de Nova Sala</h2>
        <hr>
        
        <form id="form-sala" class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Nome da Sala</label>
                <input type="text" id="nome-sala" class="form-control" required>
            </div>
            
            <div class="col-md-4">
                <label class="form-label">Capacidade (Acentos)</label>
                <input type="number" id="capacidade" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Tipo de Sala</label>
                <select id="tipo-sala" class="form-select" required>
                    <option value="">Selecione...</option>
                    <option value="2D">2D</option>
                    <option value="3D">3D</option>
                    <option value="IMAX">IMAX</option>
                </select>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary">Salvar Sala</button>
            </div>
        </form>
    </div>

    <script src="../js/salas.js"></script>
</body>
</html>
