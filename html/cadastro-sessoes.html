<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Sessões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🎥 CineWeb</a>
            <ul class="navbar-nav me-auto flex-row gap-3">
                <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
                <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                <li class="nav-item"><a class="nav-link active" href="cadastro-sessoes.html">Sessões</a></li>
                <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a></li>
                <li class="nav-item"><a class="nav-link" href="sessoes.html">Ver Sessões</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Cadastro de Nova Sessão</h2>
        <hr>
        
        <form id="form-sessao" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Filme</label>
                <select id="filme-sessao" class="form-select" required>
                    <option value="">Selecione um filme...</option>
                </select>
            </div>
            
            <div class="col-md-6">
                <label class="form-label">Sala</label>
                <select id="sala-sessao" class="form-select" required>
                    <option value="">Selecione uma sala...</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Data e Hora</label>
                <input type="datetime-local" id="data-hora" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Preço (R$)</label>
                <input type="number" id="preco" class="form-control" step="0.01" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Idioma</label>
                <select id="idioma" class="form-select" required>
                    <option value="">Selecione...</option>
                    <option value="Dublado">Dublado</option>
                    <option value="Legendado">Legendado</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Formato</label>
                <select id="formato" class="form-select" required>
                    <option value="">Selecione...</option>
                    <option value="2D">2D</option>
                    <option value="3D">3D</option>
                </select>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary">Salvar Sessão</button>
            </div>
        </form>
    </div>

    <script src="../js/sessoes.js"></script>
</body>
</html>
