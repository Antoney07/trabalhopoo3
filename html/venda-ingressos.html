<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Ingressos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🎥 CineWeb</a>
            <ul class="navbar-nav me-auto flex-row gap-3">
                <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
                <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
                <li class="nav-item"><a class="nav-link active" href="venda-ingressos.html">Vender Ingresso</a></li>
                <li class="nav-item"><a class="nav-link" href="sessoes.html">Ver Sessões</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Venda de Ingressos</h2>
        <hr>
        
        <form id="form-venda" class="row g-3">
            <div class="col-12">
                <label class="form-label">Sessão</label>
                <select id="sessao-venda" class="form-select" required>
                    <option value="">Selecione a sessão...</option>
                </select>
            </div>
            
            <div class="col-md-6">
                <label class="form-label">Nome do Cliente</label>
                <input type="text" id="nome-cliente" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">CPF</label>
                <input type="text" id="cpf-cliente" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Assento (ex: A10)</label>
                <input type="text" id="assento-venda" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Tipo de Pagamento</label>
                <select id="pagamento-venda" class="form-select" required>
                    <option value="">Selecione...</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-success">Confirmar Venda</button>
            </div>
        </form>
    </div>

    <script src="../js/v
